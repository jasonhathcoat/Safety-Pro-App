<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Safety Pro</title>
  <meta name="description" content="AI-powered workplace hazard analysis. Upload a photo, get OSHA citations and corrective actions instantly." />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #e8e2d4; font-family: 'IBM Plex Sans', sans-serif; }
    .app {
      min-height: 100vh; background: #0a0a0a;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 39px, #1a1a1a 39px, #1a1a1a 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, #1a1a1a 39px, #1a1a1a 40px);
    }
    .header {
      border-bottom: 2px solid #f5a623; padding: 16px 20px;
      display: flex; align-items: center; gap: 12px;
      background: rgba(10,10,10,0.97); position: sticky; top: 0; z-index: 100;
    }
    .header-icon {
      width: 40px; height: 40px; background: #f5a623;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
    }
    .header-icon svg { width: 20px; height: 20px; }
    .header-title { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 3px; color: #f5a623; line-height: 1; }
    .header-sub { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #666; letter-spacing: 2px; margin-top: 2px; }
    .main { max-width: 720px; margin: 0 auto; padding: 24px 16px; }
    .license-bar { display: flex; gap: 8px; margin-bottom: 20px; align-items: center; }
    .license-input {
      flex: 1; background: #111; border: 1px solid #2a2a2a; color: #e8e2d4;
      font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 1px;
      padding: 10px 14px; outline: none;
    }
    .license-input:focus { border-color: #f5a623; }
    .license-input::placeholder { color: #444; }
    .license-status { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1px; padding: 4px 10px; white-space: nowrap; }
    .ls-valid { background: #0d2e0d; color: #4ade80; border: 1px solid #166534; }
    .ls-invalid { background: #1c0a0a; color: #f87171; border: 1px solid #7f1d1d; }
    .upload-zone {
      border: 2px dashed #2a2a2a; background: #111; padding: 48px 32px;
      text-align: center; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
    }
    .upload-zone:hover, .upload-zone.drag-over { border-color: #f5a623; background: #141414; }
    .upload-icon { width: 56px; height: 56px; border: 2px solid #2a2a2a; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; background: #1a1a1a; }
    .upload-icon svg { width: 24px; height: 24px; color: #f5a623; }
    .upload-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; color: #e8e2d4; margin-bottom: 6px; }
    .upload-sub { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #555; letter-spacing: 1px; }
    .preview-container { position: relative; background: #111; border: 1px solid #2a2a2a; overflow: hidden; }
    .preview-img { width: 100%; max-height: 420px; object-fit: contain; display: block; background: #0d0d0d; }
    .preview-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.8)); padding: 16px; }
    .preview-filename { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #aaa; }
    .analyze-row { display: flex; gap: 10px; margin-top: 14px; align-items: center; flex-wrap: wrap; }
    .btn { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; border: none; cursor: pointer; padding: 11px 22px; transition: all 0.15s; display: inline-flex; align-items: center; gap: 8px; }
    .btn-primary { background: #f5a623; color: #0a0a0a; }
    .btn-primary:hover:not(:disabled) { background: #ffc15e; }
    .btn-primary:disabled { background: #333; color: #666; cursor: not-allowed; }
    .btn-ghost { background: transparent; color: #666; border: 1px solid #2a2a2a; }
    .btn-ghost:hover { border-color: #555; color: #aaa; }
    .analyzing-bar { background: #111; border: 1px solid #2a2a2a; padding: 20px; text-align: center; margin-top: 14px; }
    .analyzing-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 3px; color: #f5a623; text-transform: uppercase; margin-bottom: 14px; }
    .progress-track { height: 2px; background: #1a1a1a; overflow: hidden; }
    .progress-fill { height: 100%; background: #f5a623; animation: scan 1.8s ease-in-out infinite; }
    @keyframes scan { 0% { width: 0%; margin-left: 0%; } 50% { width: 60%; margin-left: 20%; } 100% { width: 0%; margin-left: 100%; } }
    .analyzing-sub { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #444; margin-top: 10px; letter-spacing: 1px; }
    .error-box { background: #1c0a0a; border: 1px solid #7f1d1d; border-left: 3px solid #ef4444; padding: 14px 18px; margin-top: 14px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #fca5a5; }
    .results { display: flex; flex-direction: column; gap: 4px; margin-top: 24px; }
    .results-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid #222; flex-wrap: wrap; }
    .results-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; color: #e8e2d4; }
    .severity-badge { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600; letter-spacing: 2px; padding: 3px 8px; text-transform: uppercase; }
    .sev-critical { background: #7f1d1d; color: #fca5a5; }
    .sev-high { background: #78350f; color: #fcd34d; }
    .sev-medium { background: #365314; color: #86efac; }
    .sev-low { background: #1e3a5f; color: #93c5fd; }
    .summary-bar { background: #111; border: 1px solid #2a2a2a; padding: 12px 16px; display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 8px; align-items: center; }
    .summary-stat { text-align: center; }
    .summary-number { font-family: 'Bebas Neue', sans-serif; font-size: 26px; line-height: 1; color: #f5a623; }
    .summary-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #555; letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
    .overall-risk { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; }
    .overall-risk-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #555; letter-spacing: 2px; margin-bottom: 2px; }
    .overall-risk-value { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; }
    .scene-summary { font-size: 13px; color: #888; padding: 12px 16px; line-height: 1.7; border-left: 3px solid #2a2a2a; background: #111; margin-bottom: 8px; }
    .hazard-card { background: #111; border: 1px solid #222; border-left: 3px solid #f5a623; margin-bottom: 10px; overflow: hidden; }
    .hazard-card.critical { border-left-color: #ef4444; }
    .hazard-card.high { border-left-color: #f97316; }
    .hazard-card.medium { border-left-color: #eab308; }
    .hazard-card.low { border-left-color: #3b82f6; }
    .hazard-header { padding: 14px 16px; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; cursor: pointer; user-select: none; }
    .hazard-header:hover { background: #161616; }
    .hazard-number { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: #2a2a2a; line-height: 1; flex-shrink: 0; width: 28px; }
    .hazard-meta { flex: 1; }
    .hazard-name { font-size: 14px; font-weight: 600; color: #e8e2d4; margin-bottom: 3px; }
    .hazard-type { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #666; letter-spacing: 1px; }
    .hazard-chevron { color: #444; transition: transform 0.2s; flex-shrink: 0; margin-top: 2px; }
    .hazard-chevron.open { transform: rotate(180deg); }
    .hazard-body { border-top: 1px solid #1a1a1a; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
    .hazard-section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 2px; color: #f5a623; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .hazard-section-label::after { content: ''; flex: 1; height: 1px; background: #222; }
    .hazard-description { font-size: 13px; color: #bbb; line-height: 1.7; }
    .reg-tag { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 11px; background: #1a1a1a; border: 1px solid #2a2a2a; color: #f5a623; padding: 3px 8px; margin: 2px 2px 2px 0; }
    .fix-list { list-style: none; display: flex; flex-direction: column; gap: 7px; }
    .fix-item { font-size: 13px; color: #bbb; line-height: 1.5; padding-left: 18px; position: relative; }
    .fix-item::before { content: '→'; position: absolute; left: 0; color: #f5a623; font-family: 'IBM Plex Mono', monospace; }
    .no-issues { text-align: center; padding: 40px; background: #111; border: 1px solid #1d3a1d; border-left: 3px solid #22c55e; }
    .no-issues-icon { font-size: 36px; margin-bottom: 10px; }
    .no-issues-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; color: #22c55e; margin-bottom: 6px; }
    .no-issues-sub { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #555; }
    .reset-row { display: flex; justify-content: flex-end; margin-top: 24px; padding-top: 16px; border-top: 1px solid #1a1a1a; }
    .hint { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #555; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useCallback } = React;
    const API_URL = "https://safety-pro-api-production.up.railway.app";

    function SafetyPro() {
      const [image, setImage] = useState(null);
      const [imageData, setImageData] = useState(null);
      const [analyzing, setAnalyzing] = useState(false);
      const [results, setResults] = useState(null);
      const [error, setError] = useState(null);
      const [dragOver, setDragOver] = useState(false);
      const [expandedCards, setExpandedCards] = useState({});
      const [licenseKey, setLicenseKey] = useState("");
      const [licenseValid, setLicenseValid] = useState(null);
      const fileInputRef = useRef(null);

      const handleFile = useCallback((file) => {
        if (!file || !file.type.startsWith("image/")) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          setImage({ name: file.name, url: e.target.result, type: file.type });
          setImageData(e.target.result.split(",")[1]);
          setResults(null);
          setError(null);
        };
        reader.readAsDataURL(file);
      }, []);

      const handleDrop = (e) => {
        e.preventDefault();
        setDragOver(false);
        handleFile(e.dataTransfer.files[0]);
      };

      const analyze = async () => {
        if (!imageData) return;
        setAnalyzing(true);
        setError(null);
        setLicenseValid(null);
        try {
          const res = await fetch(`${API_URL}/analyze`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ imageData, mediaType: image.type, licenseKey: licenseKey.trim() }),
          });
          const data = await res.json();
          if (res.status === 401) { setLicenseValid(false); throw new Error("Invalid license key."); }
          if (!res.ok) throw new Error(data.error || `Server error: ${res.status}`);
          setLicenseValid(true);
          setResults(data);
          if (data.hazards?.length > 0) setExpandedCards({ 0: true });
        } catch (err) {
          setError(err.message || "Analysis failed. Please try again.");
        } finally {
          setAnalyzing(false);
        }
      };

      const reset = () => { setImage(null); setImageData(null); setResults(null); setError(null); setExpandedCards({}); };
      const toggleCard = (i) => setExpandedCards(prev => ({ ...prev, [i]: !prev[i] }));
      const sevClass = (s) => ({ CRITICAL: "critical", HIGH: "high", MEDIUM: "medium", LOW: "low" })[s] || "low";
      const sevBadge = (s) => ({ CRITICAL: "sev-critical", HIGH: "sev-high", MEDIUM: "sev-medium", LOW: "sev-low" })[s] || "sev-low";
      const riskColor = (r) => ({ CRITICAL: "#ef4444", HIGH: "#f97316", MEDIUM: "#eab308", LOW: "#3b82f6", NONE: "#22c55e" })[r] || "#888";

      return (
        <div className="app">
          <header className="header">
            <div className="header-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="#0a0a0a" strokeWidth="2.5">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                <path d="M2 17l10 5 10-5"/>
                <path d="M2 12l10 5 10-5"/>
              </svg>
            </div>
            <div>
              <div className="header-title">The Safety Pro</div>
              <div className="header-sub">AI-POWERED HAZARD ANALYSIS</div>
            </div>
          </header>
          <main className="main">
            <div className="license-bar">
              <input className="license-input" placeholder="Enter Your License Key" value={licenseKey} onChange={e => setLicenseKey(e.target.value)} />
              {licenseValid === true && <span className="license-status ls-valid">✓ VALID</span>}
              {licenseValid === false && <span className="license-status ls-invalid">✗ INVALID</span>}
            </div>

            {!image ? (
              <div className={`upload-zone ${dragOver ? "drag-over" : ""}`}
                onClick={() => fileInputRef.current?.click()}
                onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
                onDragLeave={() => setDragOver(false)}
                onDrop={handleDrop}>
                <div className="upload-icon">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <rect x="3" y="3" width="18" height="18" rx="1"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <polyline points="21 15 16 10 5 21"/>
                  </svg>
                </div>
                <div className="upload-title">Drop a Workplace Photo</div>
                <div className="upload-sub" style={{marginTop: 6}}>Tap to browse · JPG, PNG, WEBP</div>
                <input ref={fileInputRef} type="file" accept="image/*" style={{display:"none"}} onChange={e => handleFile(e.target.files[0])} />
              </div>
            ) : (
              <>
                <div className="preview-container">
                  <img src={image.url} alt="Uploaded" className="preview-img" />
                  <div className="preview-overlay"><span className="preview-filename">{image.name}</span></div>
                </div>

                {!results && !analyzing && (
                  <div className="analyze-row">
                    <button className="btn btn-primary" onClick={analyze} disabled={!licenseKey.trim()}>
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                      </svg>
                      Analyze for Hazards
                    </button>
                    <button className="btn btn-ghost" onClick={reset}>Clear</button>
                    {!licenseKey.trim() && <span className="hint">Enter license key first</span>}
                  </div>
                )}

                {analyzing && (
                  <div className="analyzing-bar">
                    <div className="analyzing-label">Scanning for hazards...</div>
                    <div className="progress-track"><div className="progress-fill" /></div>
                    <div className="analyzing-sub">Checking OSHA standards · Identifying hazards · Building corrective actions</div>
                  </div>
                )}

                {error && <div className="error-box">⚠ {error}</div>}

                {results && (
                  <div className="results">
                    <div className="results-header">
                      <div className="results-title">Hazard Report</div>
                      {results.overallRisk && <span className={`severity-badge ${sevBadge(results.overallRisk)}`}>{results.overallRisk} RISK</span>}
                    </div>
                    {results.hazards?.length === 0 ? (
                      <div className="no-issues">
                        <div className="no-issues-icon">✓</div>
                        <div className="no-issues-title">No Hazards Identified</div>
                        <div className="no-issues-sub">{results.summary || "The image appears free of visible safety hazards."}</div>
                      </div>
                    ) : (
                      <>
                        <div className="summary-bar">
                          <div className="summary-stat"><div className="summary-number">{results.hazards.length}</div><div className="summary-label">Hazards</div></div>
                          <div className="summary-stat"><div className="summary-number" style={{color:"#ef4444"}}>{results.hazards.filter(h=>h.severity==="CRITICAL").length}</div><div className="summary-label">Critical</div></div>
                          <div className="summary-stat"><div className="summary-number" style={{color:"#f97316"}}>{results.hazards.filter(h=>h.severity==="HIGH").length}</div><div className="summary-label">High</div></div>
                          <div className="summary-stat"><div className="summary-number" style={{color:"#eab308"}}>{results.hazards.filter(h=>h.severity==="MEDIUM").length}</div><div className="summary-label">Medium</div></div>
                          <div className="overall-risk">
                            <div className="overall-risk-label">OVERALL</div>
                            <div className="overall-risk-value" style={{color:riskColor(results.overallRisk)}}>{results.overallRisk}</div>
                          </div>
                        </div>
                        {results.summary && <div className="scene-summary">{results.summary}</div>}
                        {results.hazards.map((h, i) => (
                          <div key={i} className={`hazard-card ${sevClass(h.severity)}`}>
                            <div className="hazard-header" onClick={() => toggleCard(i)}>
                              <div className="hazard-number">0{i+1}</div>
                              <div className="hazard-meta">
                                <div className="hazard-name">{h.name}</div>
                                <div className="hazard-type">{h.type}</div>
                              </div>
                              <span className={`severity-badge ${sevBadge(h.severity)}`} style={{flexShrink:0}}>{h.severity}</span>
                              <svg className={`hazard-chevron ${expandedCards[i]?"open":""}`} width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                <polyline points="6 9 12 15 18 9"/>
                              </svg>
                            </div>
                            {expandedCards[i] && (
                              <div className="hazard-body">
                                <div><div className="hazard-section-label">Description</div><div className="hazard-description">{h.description}</div></div>
                                <div><div className="hazard-section-label">Regulations</div><div>{h.regulations?.map((r,ri)=><span key={ri} className="reg-tag">{r}</span>)}</div></div>
                                <div><div className="hazard-section-label">Corrective Actions</div><ul className="fix-list">{h.corrections?.map((c,ci)=><li key={ci} className="fix-item">{c}</li>)}</ul></div>
                              </div>
                            )}
                          </div>
                        ))}
                      </>
                    )}
                    <div className="reset-row"><button className="btn btn-ghost" onClick={reset}>Analyze Another Photo</button></div>
                  </div>
                )}
              </>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<SafetyPro />);
  </script>
</body>
</html>
